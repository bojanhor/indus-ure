# Temporary HTTP configuration for the first Certbot run only.
limit_req_zone $binary_remote_addr zone=indus_oauth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    listen 8081;
    listen [::]:8081;
    server_name ure.indus.si;

    root /opt/indus-ure/current/outputs;
    client_max_body_size 7m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    location = / {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /index.html {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
    }

    location = /service-worker.js {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
    }

    location ^~ /vendor/pdfjs/ {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /api/auth/google-url {
        limit_req zone=indus_oauth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    # Videos are streamed directly to the application's private media storage.
    # Keep the request out of nginx buffers so the browser can report progress.
    location = /api/todos/video {
        client_max_body_size 210m;
        client_body_timeout 15m;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 60s;
        proxy_send_timeout 15m;
        proxy_read_timeout 15m;
    }
    location = /api/backup/restore {
        limit_req zone=indus_oauth burst=2 nodelay;
        client_max_body_size 1600m;
        client_body_timeout 15m;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 60s;
        proxy_send_timeout 15m;
        proxy_read_timeout 15m;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /calendar.ics {
        access_log off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
    }

    location = /server.js { return 404; }
    location = /clients-seed.json { return 404; }
    location ^~ /data/ { return 404; }
    location / { return 404; }
}