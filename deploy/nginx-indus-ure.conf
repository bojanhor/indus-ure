# /etc/nginx/conf.d/indus-ure.conf
# The HTML shell goes through Node so each response receives a fresh CSP nonce.
limit_req_zone $binary_remote_addr zone=indus_oauth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name ure.indus.si;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 8081;
    listen [::]:8081;
    http2 on;
    server_name ure.indus.si;

    ssl_certificate /etc/letsencrypt/live/ure.indus.si/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ure.indus.si/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/indus-ure/current/outputs;
    client_max_body_size 7m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    location = / {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /index.html {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /service-worker.js {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location ^~ /vendor/pdfjs/ {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /api/auth/google-url {
        limit_req zone=indus_oauth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    # Videos are streamed to Google Drive; keep the request out of nginx buffers.
    location = /api/todos/drive-video {
        client_max_body_size 210m;
        client_body_timeout 15m;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 60s;
        proxy_send_timeout 15m;
        proxy_read_timeout 15m;
    }
    # Browser restore is intentionally larger than ordinary attachment requests.
    location = /api/backup/restore {
        limit_req zone=indus_oauth burst=2 nodelay;
        client_max_body_size 1600m;
        client_body_timeout 15m;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 60s;
        proxy_send_timeout 15m;
        proxy_read_timeout 15m;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location = /calendar.ics {
        access_log off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
    }

    location = /server.js { return 404; }
    location = /clients-seed.json { return 404; }
    location ^~ /data/ { return 404; }
    location / { return 404; }
}