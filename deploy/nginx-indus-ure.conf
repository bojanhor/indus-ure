# Datoteka je namenjena /etc/nginx/conf.d/indus-ure.conf.
# Javni HTTPS edge naj ure.indus.si posreduje na 192.168.50.242:8081.
limit_req_zone $binary_remote_addr zone=indus_oauth:10m rate=10r/m;

server {
    listen 8081;
    listen [::]:8081;
    server_name ure.indus.si;

    root /opt/indus-ure/current/outputs;
    index index.html;
    client_max_body_size 7m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /api/auth/google-url {
        limit_req zone=indus_oauth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    location = /calendar.ics {
        access_log off;
        proxy_pass http://127.0.0.1:8123;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Defense in depth: backend teh poti prav tako ne servira.
    location = /server.js { return 404; }
    location = /clients-seed.json { return 404; }
    location ^~ /data/ { return 404; }
    location / { return 404; }
}
